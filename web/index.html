<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">
  <script>
    // Restore the path encoded by 404.html (GitHub Pages SPA redirect).
    // See: https://github.com/rafgraph/spa-github-pages
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="qr_bookmark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>qr_bookmark</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // Called from Dart when a QR display screen is opened.
    // Stores the QR URL so the service worker can inject it as start_url
    // in the manifest when the user adds the page to their home screen.
    function setQrStartUrl(url) {
      if (!('serviceWorker' in navigator)) return;

      function doUpdate() {
        // Write to Cache API for persistence across SW restarts.
        if ('caches' in window) {
          caches.open('qr-state-v1').then(function(cache) {
            return cache.put('qr-start-url', new Response(url));
          }).then(function() {
            // Force a manifest re-fetch now that the Cache API is updated.
            // The SW will intercept this fetch and return the modified manifest.
            var link = document.querySelector('link[rel="manifest"]');
            if (link) {
              link.href = 'manifest.json?v=' + Date.now();
            }
          });
        }
        // Also notify the active SW via postMessage.
        var sw = navigator.serviceWorker.controller;
        if (sw) {
          sw.postMessage({ type: 'SET_QR_URL', url: url });
        }
      }

      if (navigator.serviceWorker.controller) {
        // SW is already controlling this page.
        doUpdate();
      } else {
        // First visit: wait for the SW to take control (clients.claim()),
        // then update. This ensures the SW can intercept the manifest re-fetch.
        navigator.serviceWorker.addEventListener('controllerchange', doUpdate, { once: true });
      }
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
