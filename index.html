<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">
  <script>
    // Restore the path encoded by 404.html (GitHub Pages SPA redirect).
    // See: https://github.com/rafgraph/spa-github-pages
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Generate QR codes from text or binary data and bookmark them via URL.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="qr_bookmark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>qr_bookmark</title>

  <!--
    manifest の href は JavaScript で動的に設定する。
    最初から href を指定すると iOS が静的な manifest.json をキャッシュしてしまうため、
    あえて空にしておく。
  -->
  <link rel="manifest" id="pwa-manifest">
  <script>
    // manifest.json を blob URL として動的生成し <link rel="manifest"> に設定する。
    // iOSでホーム画面追加時の start_url を現在のURLに固定するための対策。
    // 参考: https://qiita.com/yjtakahagi/items/c247223ca35f5bf1f310
    //
    // 注意: blob manifest ではアイコンのパスをフルパスで指定しないと有効にならない。
    var _qrIconMode = false;

    function updatePwaManifest(startUrl) {
      var link = document.getElementById('pwa-manifest');
      if (!link) return;
      // 前回の blob URL を解放する
      var prev = link.href;
      if (prev && prev.startsWith('blob:')) URL.revokeObjectURL(prev);

      var origin = location.protocol + '//' + location.host;
      var manifest = {
        name: 'qr_bookmark',
        short_name: 'qr_bookmark',
        start_url: startUrl,
        display: 'standalone',
        background_color: '#0175C2',
        theme_color: '#0175C2',
        description: 'Generate QR codes from text or binary data and bookmark them via URL.',
        orientation: 'portrait-primary',
        prefer_related_applications: false,
        icons: _qrIconMode
          ? [
              { src: origin + '/icons/qr-dynamic-icon.png', sizes: '192x192', type: 'image/png' },
              { src: origin + '/icons/qr-dynamic-icon.png', sizes: '512x512', type: 'image/png' }
            ]
          : [
              { src: origin + '/icons/Icon-192.png',          sizes: '192x192', type: 'image/png' },
              { src: origin + '/icons/Icon-512.png',          sizes: '512x512', type: 'image/png' },
              { src: origin + '/icons/Icon-maskable-192.png', sizes: '192x192', type: 'image/png', purpose: 'maskable' },
              { src: origin + '/icons/Icon-maskable-512.png', sizes: '512x512', type: 'image/png', purpose: 'maskable' }
            ]
      };
      link.href = URL.createObjectURL(
        new Blob([JSON.stringify(manifest)], { type: 'application/json' })
      );
    }

    // ページ読み込み時点の URL (404.html によるリダイレクト復元後) で初期化する。
    updatePwaManifest(location.href);

    // Dart (pwa_icon_service_web.dart) から QR 表示画面を開いたときに呼ばれる。
    // start_url を QR の URL に更新する。
    function setQrStartUrl(url) {
      updatePwaManifest(url);
    }

    // Dart から QR 表示画面でアイコンが確定したときに呼ばれる。
    // SW にアイコン PNG をキャッシュさせ、blob manifest の icons を仮想 URL に切り替える。
    function setQrIcon(dataUrl) {
      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: 'SET_QR_ICON',
          dataUrl: dataUrl,
        });
      }
      _qrIconMode = true;
      updatePwaManifest(location.href);
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
